<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siroz Quran</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3144047456957450" crossorigin="anonymous"></script>

    <link rel="icon" type="image/png" href="https://i.ibb.co/B56sM9HR/IMG-20260322-202243.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/B56sM9HR/IMG-20260322-202243.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --gold: #ffbf00; --dark: #02091a; --card-bg: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; color: white; background: var(--dark); height: 100vh; overflow: hidden; }
        .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.ibb.co/wN1nNJpq/27c9527ef35ec8fedb3b2af95287a462.jpg') no-repeat center center fixed; background-size: cover; z-index: -1; }
        .overlay { background: rgba(2, 9, 26, 0.94); height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; }
        .scroll-area { flex: 1; width: 100%; max-width: 600px; overflow-y: auto; padding: 10px; }
        .page { display: none; width: 100%; text-align: center; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-main { background: var(--gold); color: black; border: none; padding: 18px; margin: 12px auto; border-radius: 50px; font-weight: bold; width: 90%; font-size: 1.2rem; cursor: pointer; display: block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card-btn { background: var(--card-bg); border: 1px solid rgba(255,191,0,0.3); color: white; padding: 15px 5px; border-radius: 12px; cursor: pointer; min-height: 85px; }
        .search-box { width: 90%; background: rgba(255,255,255,0.1); border: 2px solid var(--gold); border-radius: 50px; padding: 12px; color: white; margin: 10px 0; text-align: center; outline: none; font-size: 1rem; }
        .ayah-container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 4px solid var(--gold); text-align: right; line-height: 1.8; }
        .ayah-container.ltr { border-right: none; border-left: 4px solid var(--gold); text-align: left; }
        .quran-text { font-size: 1.4rem; display: block; margin-bottom: 10px; color: #fff; }
        .translation-text { font-size: 1.05rem; color: var(--gold); display: block; }
        .back-btn { background: #333; color: white; border: none; padding: 12px 35px; border-radius: 50px; cursor: pointer; margin: 20px 0; }
        .footer { padding: 15px; font-size: 0.85rem; text-align: center; color: #f1ebd9; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
<div class="background"></div>
<div class="overlay">
    <div class="scroll-area">
        <div id="pHome" class="page active">
            <img src="https://i.ibb.co/B56sM9HR/IMG-20260322-202243.png" style="width: 120px; border-radius: 50%; margin-bottom: 20px;">
            <h1 style="color: var(--gold);">Siroz Quran</h1>
            <button class="btn-main" onclick="startApp('ar')">العربية (تفسير)</button>
            <button class="btn-main" onclick="startApp('sorani')">کوردی سۆرانی</button>
            <button class="btn-main" onclick="startApp('ar_only')">القرآن الكريم (قراءة)</button>
            <button class="btn-main" onclick="startApp('en')">English (Sahih)</button>
        </div>

        <div id="pIndex" class="page">
            <h2 id="idxTitle" style="color: var(--gold);"></h2>
            <input type="text" id="sInput" class="search-box" placeholder="بحث عن سورة..." oninput="searchS()">
            <div class="grid" id="sGrid"></div>
            <button class="back-btn" onclick="showP('pHome')">رجوع</button>
        </div>

        <div id="pRead" class="page">
            <h2 id="surahName" style="color: var(--gold);"></h2>
            <input type="text" id="aInput" class="search-box" placeholder="ابحث عن كلمة..." oninput="searchA()">
            <div id="aList"></div>
            <button class="back-btn" onclick="showP('pIndex')">رجوع</button>
        </div>
    </div>
    <div class="footer"><b>By Siroz: Zakho</b></div>
</div>

<script>
    let mode = 'ar';
    const sNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    const enNames = ["Al-Fatihah","Al-Baqarah","Ali 'Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Taha","Al-Anbiya","Al-Haj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munافقون","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddathir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
    const kuNames = ["فاتحة","بەقەرە","ئالی عیمران","نیسا","مائیدە","ئەنعام","ئەعراف","ئەنفال","تەوبە","یونس","هود","یوسف","رەعد","ئیبراهیم","حیجر","نەحل","ئیسرا","کەهف","مریەم","تاها","ئەنبیا","حەج","مۆمنون","نور","فورقان","شوعەرا","نەمل","قەسەس","عەنکەبوت","روم","لوقمان","سەجدە","ئەحزاب","سەبە","فاتیر","یاسین","سافات","ساد","زومەر","غافیر","فوسیلەت","شورا","زوخروف","دوخان","جاسیە","ئەحقاف","موحەمەد","فەتح","حوجورات","قاف","زاریات","تور","نەجم","قەمەر","رەحمان","واقێعە","حەدید","موجادەلە","حەشر","مومتەحەنە","سەف","جوموعە","مونافیقون","تەغابون","تەلاق","تەحريم","مولک","قەلەم","حاقە","مەعاریج","نوح","جن","موزەممیل","مودەسر","قیامە","ئینسان","مورسەلات","نەبە","نازيەكات","عەبەس","تەکوییر","ئینفیتار","موتەفیفین","ئینشیقاق","بورووج","تاریق","ئەعلا","غاسیە","فەجر","بەلەد","شەمس","لەیل","زوحا","شەرح","تین","عەلەق","قەدر","بەیینە","زەلزەلە","عادیات","قاریعە","تەکاسور","عەسر","هومەزە","فیل","قورەيش","ماعون","کەوسەر","کافیرون","نەسر","مەسەد","ئیخلاس","فەلەق","ناس"];

    const surahList = sNames.map((n, i) => ({ id: i + 1, ar: n, en: enNames[i], ku: kuNames[i] }));

    function clean(t) { 
        if(!t) return "";
        return t.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[أإآ]/g, 'ا').replace(/[پ]/g, 'ب').replace(/[ژ]/g, 'ز').toLowerCase().trim(); 
    }

    function startApp(l) {
        mode = l;
        document.body.dir = (l === 'en') ? 'ltr' : 'rtl';
        const titles = { ar: "فهرس السور", sorani: "لیستی سوورەتەکان", ar_only: "القرآن الكريم", en: "Surah Index" };
        document.getElementById('idxTitle').innerText = titles[l];
        document.getElementById('sInput').value = ""; 
        renderS(surahList);
        showP('pIndex');
    }

    function renderS(list) {
        const g = document.getElementById('sGrid'); g.innerHTML = "";
        list.forEach(s => {
            const b = document.createElement('button'); b.className = 'card-btn';
            let n = (mode === 'en') ? s.en : (mode === 'sorani' ? s.ku : s.ar);
            b.innerHTML = `<small>${s.id}</small><br><b>${n}</b>`;
            b.onclick = () => loadS(s.id, n);
            g.appendChild(b);
        });
    }

    function searchS() {
        const q = clean(document.getElementById('sInput').value);
        const f = surahList.filter(s => 
            clean(s.ar).includes(q) || 
            clean(s.en).includes(q) || 
            clean(s.ku).includes(q) || 
            s.id.toString() === q
        );
        renderS(f);
    }

    async function loadS(id, name) {
        document.getElementById('surahName').innerText = name;
        document.getElementById('aInput').value = "";
        const l = document.getElementById('aList'); l.innerHTML = "<h3>جاري التحميل...</h3>";
        showP('pRead');
        const map = { ar: "ar.muyassar", sorani: "ku.asan", en: "en.sahih", ar_only: "" };
        try {
            const rQ = await fetch(`https://api.alquran.cloud/v1/surah/${id}/quran-simple`);
            const dQ = await rQ.json();
            let dT = null;
            if (mode !== 'ar_only') {
                const rT = await fetch(`https://api.alquran.cloud/v1/surah/${id}/${map[mode]}`);
                dT = await rT.json();
            }
            l.innerHTML = "";
            dQ.data.ayahs.forEach((a, i) => {
                const div = document.createElement('div');
                div.className = "ayah-container";
                if(mode === 'en') div.classList.add('ltr');
                let content = `<span class="quran-text">${a.text} <small>(${a.numberInSurah})</small></span>`;
                if (dT) content += `<span class="translation-text">${dT.data.ayahs[i].text}</span>`;
                div.innerHTML = content;
                l.appendChild(div);
            });
        } catch (e) { l.innerHTML = "خطأ في الاتصال"; }
    }

    function searchA() {
        const query = clean(document.getElementById('aInput').value);
        const containers = document.getElementsByClassName('ayah-container');
        for (let i = 0; i < containers.length; i++) {
            const text = clean(containers[i].textContent || containers[i].innerText);
            containers[i].style.display = text.includes(query) ? "" : "none";
        }
    }

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelector('.scroll-area').scrollTop = 0;
    }
</script>
</body>
</html>
